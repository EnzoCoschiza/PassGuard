services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: passguard-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: passguard-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
